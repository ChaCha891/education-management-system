<head>

  <style>
    :root {
      --bg:#f5f7fa; --card:#fff; --line:#d9dee7; --text:#1f2937; --muted:#6b7280;
      --primary:#2563eb; --primary-dark:#1d4ed8; --green:#16a34a; --red:#dc2626; --yellow:#f59e0b;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .header{position:sticky;top:0;z-index:50;background:#fff;border-bottom:1px solid var(--line);padding:16px;display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    h1{font-size:22px;margin:0}.nav{display:flex;gap:8px;flex-wrap:wrap}.container{max-width:1220px;margin:0 auto;padding:16px}
    button,.btn{border:0;border-radius:12px;padding:10px 14px;background:#eef2f7;color:#111827;font-weight:800;cursor:pointer;text-decoration:none;display:inline-block;text-align:center;font-size:14px}
    button.primary,.btn.primary{background:var(--primary);color:#fff}button.green,.btn.green{background:var(--green);color:#fff}button.red,.btn.red{background:var(--red);color:#fff}
    button.active{background:var(--primary);color:#fff}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 6px 18px rgba(31,41,55,.05)}
    h2{font-size:18px;margin:0 0 12px}.small{font-size:13px;color:var(--muted)}.left{text-align:left}.mini{display:block;font-size:12px;color:var(--muted);margin-top:4px}.info{background:#e0f2fe;color:#075985}.danger-text{color:#dc2626}.warn-text{color:#b45309}.ok-text{color:#166534}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.form-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
    label{font-size:13px;color:var(--muted);font-weight:800;display:block;margin-bottom:5px}input,select,textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:12px;font-size:14px;background:#fff}textarea{min-height:95px;resize:vertical}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px}table{width:100%;border-collapse:collapse;background:#fff}th,td{border-bottom:1px solid #edf0f5;padding:10px;text-align:center;font-size:14px;white-space:nowrap}th{background:#eef2f7;font-weight:900}tr:last-child td{border-bottom:0}
    .badge{display:inline-block;padding:5px 8px;border-radius:999px;font-weight:900;font-size:12px}.edu-chip{display:inline-block;margin:3px;padding:6px 9px;border-radius:999px;background:#eef2f7;font-weight:800;font-size:12px}.due{background:#fee2e2;color:#991b1b}.soon{background:#fef3c7;color:#92400e}.ok{background:#dcfce7;color:#166534}
    .hidden{display:none!important}.mobile-card{border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;background:#fff}
    .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:12px 16px;border-radius:999px;display:none;z-index:99}
    .menu-toggle{display:none;width:auto;min-width:46px;padding:10px 12px;font-size:22px;line-height:1;background:#eef2f7}
    .menu-backdrop{display:none;position:fixed;inset:0;background:rgba(17,24,39,.42);z-index:40}
    .menu-backdrop.open{display:block}

    .calendar-toolbar{display:flex;gap:8px;align-items:center;justify-content:space-between;flex-wrap:wrap;margin-bottom:12px}
    .calendar-title{font-size:20px;font-weight:900}
    .calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px}
    .calendar-head{font-weight:900;text-align:center;padding:8px;color:var(--muted)}
    .day-cell{min-height:118px;background:#fff;border:1px solid var(--line);border-radius:14px;padding:10px;cursor:pointer;overflow:hidden}
    .day-cell:hover{outline:2px solid #bfdbfe}.day-cell.empty{background:transparent;border:0;cursor:default}.day-cell.today{border:2px solid var(--primary)}
    .day-num{font-weight:900;margin-bottom:6px}.shift-name{display:block;font-size:12px;margin:3px 0;padding:4px 6px;border-radius:8px;background:#eef2f7;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .selected-date-box{border:2px solid #bfdbfe}.worker-checks{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.check-item{display:grid;grid-template-columns:auto 1fr 110px;align-items:center;gap:8px;border:1px solid var(--line);border-radius:12px;padding:9px;background:#fff}.check-item input{width:auto}.check-item select{padding:8px}.worker-shift-list{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}.worker-shift-btn{border:1px solid var(--line);background:#fff;border-radius:14px;padding:12px;text-align:left;cursor:pointer;font-weight:900}.worker-shift-btn:hover{outline:2px solid #bfdbfe}.worker-shift-btn .status{margin-top:6px}.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:16px}.modal{background:#fff;border-radius:18px;border:1px solid var(--line);width:min(520px,100%);padding:16px;box-shadow:0 20px 60px rgba(0,0,0,.22)}.modal-title{font-size:18px;font-weight:900;margin-bottom:4px}.shift-day{background:#dbeafe;color:#1e40af}.shift-night{background:#ede9fe;color:#5b21b6}.detail-top{display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.detail-list{display:grid;gap:8px}.detail-row{display:flex;justify-content:space-between;gap:10px;align-items:center;border:1px solid var(--line);border-radius:12px;padding:10px;background:#fff}.detail-worker{font-weight:900}.detail-note{white-space:pre-wrap;text-align:left;background:#f8fafc;border:1px solid var(--line);border-radius:12px;padding:12px}
    @media(max-width:760px){
      .header{align-items:center;flex-wrap:nowrap;padding:10px 12px}
      .header h1{font-size:18px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .menu-toggle{display:inline-block;width:46px;flex:0 0 auto}
      .nav{position:fixed;top:0;right:-82%;width:82%;max-width:320px;height:100vh;background:#fff;z-index:60;display:flex;flex-direction:column;gap:8px;padding:18px 14px;border-left:1px solid var(--line);box-shadow:-8px 0 22px rgba(31,41,55,.18);transition:right .22s ease;overflow:auto}
      .nav.open{right:0}
      .nav::before{content:"메뉴";font-size:18px;font-weight:900;margin:2px 4px 8px;color:var(--text)}
      .nav button{width:100%;text-align:left}
      .container{padding:12px}
      .grid,.grid3,.form-row,.worker-checks,.worker-shift-list{grid-template-columns:1fr}
      button,.btn{width:100%}
      .menu-toggle{width:46px}
      th,td{font-size:13px;padding:8px}
      .calendar-grid{gap:4px}.day-cell{min-height:90px;padding:6px}.shift-name{font-size:11px;padding:3px 4px}
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>교육관리 시스템</h1>
    <button class="menu-toggle" onclick="event.stopPropagation(); toggleMenu()" aria-label="메뉴 열기">☰</button>
    <div class="nav" id="main-nav" onclick="event.stopPropagation()">
      <button onclick="showPage('mobile')" id="nav-mobile">현장 모바일</button>

  <div class="container">
    <div id="setup-warning" class="card hidden">
      <h2>Supabase 연결 설정 필요</h2>
      <p class="small">HTML 파일 상단의 SUPABASE_URL, SUPABASE_ANON_KEY 값을 본인 Supabase 프로젝트 값으로 바꿔야 작동합니다.</p>

    <section id="page-calendar" class="page hidden"></section>
    <section id="page-workers" class="page hidden"></section>
    <section id="page-history" class="page hidden"></section>

    <section id="page-equipment" class="page hidden"></section>
    <section id="page-settings" class="page hidden"></section>
  </div>

  <div id="toast" class="toast"></div>

<script>
// =========================
// 1) 여기에 Supabase 값을 넣으세요.
// =========================
const SUPABASE_URL = "https://widvjrtvjjuvknpjujkf.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndpZHZqcnR2amp1dmtucGp1amtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0ODY0NzIsImV4cCI6MjA5NDA2MjQ3Mn0.ThmHVS56_yf1L3yGq8sJHBtSiLHu8javo5aboqwvKBA";

const DEFAULT_TEMPLATE = `[교육 안내]\n{name} 기사님, {education} 일정 안내드립니다.\n교육 예정일: {next_date} ({dday})\n기한 내 교육 이수 부탁드립니다.`;
// 기본 교육기준표: 최초 실행 또는 설정값이 없을 때만 사용합니다.
// 이후에는 [설정] 화면에서 추가/수정/삭제한 education_rules 설정값을 우선 사용합니다.
const DEFAULT_EDUCATION_RULES = [
  { education_name: "MSDS 안전보건교육", category: "반복/변경 시", cycle_days: 365, hours: "물질 변경/신규 취급 시 별도", condition: "MSDS 대상물질 취급자", basis: "MSDS 교육 관리", active: true },
  { education_name: "신규채용자 안전보건교육", category: "1회성", cycle_days: 0, hours: "최초 1회", condition: "신규 투입자", basis: "채용 시 교육", active: true },
  { education_name: "특별안전보건교육", category: "조건부", cycle_days: 0, hours: "작업 투입/변경 시", condition: "특별교육 대상작업 투입자", basis: "특별교육 대상작업", active: true },
  { education_name: "정기안전보건교육", category: "반복", cycle_days: 90, hours: "분기 단위 관리", condition: "정기교육 대상자", basis: "정기교육 관리", active: true },
  { education_name: "출입교육", category: "반복", cycle_days: 365, hours: "현장 기준", condition: "협력업체 및 외부 출입자", basis: "사업장 출입·협력업체 관리 기준", active: true }
];

let db = null;
let state = { workers: [], education: [], history: [], equipment: [], settings: {}, due: [] };
let currentPage = "mobile";
let calendarCursor = new Date();
let selectedShiftDate = todayStr();
let calendarDetailDate = "";
let activeShiftWorkerId = null;
let workerShiftSearch = "";
let workerShiftComposing = false;
let clearShiftInputAfterSave = false;

function ready() {
  if (SUPABASE_URL.includes("YOUR_") || SUPABASE_ANON_KEY.includes("YOUR_")) {
    document.getElementById("setup-warning").classList.remove("hidden");
    return false;
  }
  db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  return true;
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 1800);
}

function todayStr() { return new Date().toISOString().slice(0,10); }
function onlyDigits(v){ return String(v || "").replace(/\D/g, ""); }
function autoHyphenDate(v){
  const d = onlyDigits(v).slice(0,8);
  if(d.length <= 4) return d;
  if(d.length <= 6) return `${d.slice(0,4)}-${d.slice(4)}`;
  return `${d.slice(0,4)}-${d.slice(4,6)}-${d.slice(6,8)}`;
}
function autoHyphenPhone(v){
  const d = onlyDigits(v).slice(0,11);
  if(d.startsWith("02")){
    if(d.length <= 2) return d;
    if(d.length <= 5) return `${d.slice(0,2)}-${d.slice(2)}`;
    if(d.length <= 9) return `${d.slice(0,2)}-${d.slice(2,5)}-${d.slice(5)}`;
    return `${d.slice(0,2)}-${d.slice(2,6)}-${d.slice(6)}`;
  }
  if(d.length <= 3) return d;
  if(d.length <= 7) return `${d.slice(0,3)}-${d.slice(3)}`;
  return `${d.slice(0,3)}-${d.slice(3,7)}-${d.slice(7)}`;
}
function isValidDateText(v){
  if(!/^\d{4}-\d{2}-\d{2}$/.test(v || "")) return false;
  const [y,m,d] = v.split("-").map(Number);
  const date = new Date(`${v}T00:00:00`);
  return date.getFullYear()===y && date.getMonth()+1===m && date.getDate()===d;
}
function dateVal(id){ return autoHyphenDate(val(id)); }
function phoneVal(id){ return autoHyphenPhone(val(id)); }
function bindAutoFormatInputs(){
  document.querySelectorAll('input[data-format="date"]').forEach(el => {
    if(el.dataset.bound === "1") return;
    el.dataset.bound = "1";
    el.setAttribute("inputmode", "numeric");
    el.setAttribute("maxlength", "10");
    el.addEventListener("input", () => { el.value = autoHyphenDate(el.value); });
    el.addEventListener("blur", () => { el.value = autoHyphenDate(el.value); });
  });
  document.querySelectorAll('input[data-format="phone"]').forEach(el => {
    if(el.dataset.bound === "1") return;
    el.dataset.bound = "1";
    el.setAttribute("inputmode", "numeric");
    el.setAttribute("maxlength", "13");
    el.addEventListener("input", () => { el.value = autoHyphenPhone(el.value); });
    el.addEventListener("blur", () => { el.value = autoHyphenPhone(el.value); });
  });
}

function addDays(dateText, days) {
  const d = new Date(dateText + "T00:00:00");
  d.setDate(d.getDate() + Number(days));
  return d;
}
function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function remainDays(target) {
  const today = new Date(todayStr() + "T00:00:00");
  return Math.round((target - today) / (1000*60*60*24));
}
function ddayText(remain) {
  if (remain === null || remain === undefined || Number.isNaN(remain)) return "반복없음";
  if (remain < 0) return `D+${Math.abs(remain)}`;
  if (remain === 0) return "D-Day";
  return `D-${remain}`;
}
function isOneTimeCycle(cycleDays){ return Number(cycleDays) <= 0; }
function educationRules(){
  try {
    const parsed = JSON.parse(state.settings.education_rules || "");
    if (Array.isArray(parsed)) return parsed;
  } catch(e) {}
  return DEFAULT_EDUCATION_RULES;
}
function activeEducationRules(){ return educationRules().filter(r => r.active !== false); }
function defaultRetentionRules(){
  return educationRules().map(r => ({ education_name:r.education_name, retention_years:5, note:"", active:r.active !== false }));
}
function retentionRules(){
  try {
    const parsed = JSON.parse(state.settings.retention_rules || "");
    if (Array.isArray(parsed)) return parsed;
  } catch(e) {}
  return defaultRetentionRules();
}
function getRetentionRule(name){ return retentionRules().find(r => r.education_name === name && r.active !== false) || null; }
function retentionAckKeys(){
  try {
    const parsed = JSON.parse(state.settings.retention_ack_keys || "[]");
    return Array.isArray(parsed) ? parsed : [];
  } catch(e) { return []; }
}

function shiftCalendar(){
  try {
    const parsed = JSON.parse(state.settings.shift_calendar || "[]");
    return Array.isArray(parsed) ? parsed : [];
  } catch(e) { return []; }
}
function shiftsByDate(dateText){ return shiftCalendar().filter(x => x.work_date === dateText); }
function addDaysText(dateText, days){ return formatDate(addDays(dateText, days)); }
function workerNameById(id){ return state.workers.find(w => Number(w.id) === Number(id))?.name || ""; }
function historyRecordKey(h){ return h?.id ? `history:${h.id}` : `history:${h.worker_id}:${h.education_name}:${h.education_date}`; }
function addYears(dateText, years){
  const d = new Date(dateText + "T00:00:00");
  d.setFullYear(d.getFullYear() + Number(years));
  return d;
}
function retentionStatus(h){
  const rule = getRetentionRule(h.education_name);
  if(!rule || !h.education_date || Number(rule.retention_years) <= 0) return {managed:false, expired:false, expiryText:"-", ack:false, years:"-"};
  const expiry = addYears(h.education_date, Number(rule.retention_years));
  const expired = remainDays(expiry) < 0;
  const key = historyRecordKey(h);
  const ack = retentionAckKeys().includes(key);
  return {managed:true, expired, expiryText:formatDate(expiry), ack, key, years:Number(rule.retention_years)};
}
function educationTypeNames(){ return activeEducationRules().map(r => r.education_name).filter(Boolean); }
function getEducationRule(name){ return activeEducationRules().find(r => r.education_name === name) || null; }
function educationMeta(name){ const r=getEducationRule(name); return r ? `${r.category || "구분없음"} · ${r.hours || "시간/조건 미입력"}` : "사용자 지정"; }
function calcSchedule(lastDate, cycleDays){
  if(!lastDate) return { nextText:"-", remain:null, dday:"-", cls:"gray", status:"미등록" };
  if(isOneTimeCycle(cycleDays)) return { nextText:"반복없음", remain:null, dday:"완료", cls:"info", status:"이수" };
  const nd=addDays(lastDate, cycleDays);
  const remain=remainDays(nd);
  const status=remain<0?"기한초과":remain<=14?"임박":"정상";
  return { nextText:formatDate(nd), remain, dday:ddayText(remain), cls:badgeClass(remain), status };
}
function badgeClass(remain) {
  if (remain === null || remain === undefined || Number.isNaN(remain)) return "info";
  if (remain < 0) return "due";
  if (remain <= 14) return "soon";
  return "ok";
}
function escapeHtml(v) {
  return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
}
function smsBody(item) {
  const template = state.settings.sms_template || DEFAULT_TEMPLATE;
  return template
    .replaceAll("{name}", item.name || "")
    .replaceAll("{education}", item.education_name || "")
    .replaceAll("{next_date}", item.next_date || "")
    .replaceAll("{dday}", item.dday || "")
    .replaceAll("{phone}", item.phone || "");
}
function smsLink(item) {
  const phone = String(item.phone || "").replaceAll("-","").replaceAll(" ","");
  return `sms:${phone}?body=${encodeURIComponent(smsBody(item))}`;
}

async function loadAll() {
  if (!db) return;
  const [w, e, h, eq, s] = await Promise.all([
    db.from("workers").select("*").order("name"),
    db.from("education_records").select("*").order("education_name"),
    db.from("training_history").select("*").order("education_date", { ascending:false }),
    db.from("equipment").select("*").order("id"),
    db.from("settings").select("*")
  ]);
  if (w.error || e.error || h.error || eq.error || s.error) {
    toast("DB 조회 오류: 테이블 생성 여부를 확인하세요.");
    console.error(w.error || e.error || h.error || eq.error || s.error);
    return;
  }
  state.workers = w.data || [];
  state.education = e.data || [];
  state.history = h.data || [];
  state.equipment = eq.data || [];
  state.settings = {};
  (s.data || []).forEach(x => state.settings[x.key] = x.value);
  if (!state.settings.sms_template) state.settings.sms_template = DEFAULT_TEMPLATE;
  if (!state.settings.education_rules) state.settings.education_rules = JSON.stringify(DEFAULT_EDUCATION_RULES);
  if (!state.settings.retention_rules) state.settings.retention_rules = JSON.stringify(defaultRetentionRules());
  if (!state.settings.retention_ack_keys) state.settings.retention_ack_keys = JSON.stringify([]);
  if (!state.settings.shift_calendar) state.settings.shift_calendar = JSON.stringify([]);
  makeDue();
  renderCurrent();
}

function latestHistoryDate(workerId, educationName) {
  const dates = state.history
    .filter(h => Number(h.worker_id) === Number(workerId) && h.education_name === educationName)
    .map(h => h.education_date)
    .filter(Boolean)
    .sort()
    .reverse();
  return dates[0] || "";
}

function makeDue() {
  const result = [];
  const rules = activeEducationRules();
  for (const w of state.workers) {
    for (const r of rules) {
      const last = latestHistoryDate(w.id, r.education_name);
      const sch = calcSchedule(last, Number(r.cycle_days));
      if (sch.remain !== null && sch.remain <= 30) {
        result.push({
          worker_id:w.id,
          education_name:r.education_name,
          cycle_days:Number(r.cycle_days),
          name:w.name,
          phone:w.phone || "",
          company:w.company || "",
          last_date:last,
          next_date:sch.nextText,
          remain:sch.remain,
          dday:sch.dday,
          status:sch.status
        });
      }
    }
  }
  result.sort((a,b) => a.remain - b.remain || a.name.localeCompare(b.name, "ko"));
  state.due = result;
}

function dashboardStats(){
  let overdue=0, soon=0, normal=0, oneTime=0, missing=0;
  for(const w of state.workers){
    for(const r of activeEducationRules()){
      const last = latestHistoryDate(w.id, r.education_name);
      if(!last){ missing++; continue; }
      const sch=calcSchedule(last, Number(r.cycle_days));
      if(sch.remain===null) oneTime++;
      else if(sch.remain<0) overdue++;
      else if(sch.remain<=14) soon++;
      else normal++;
    }
  }
  return {overdue, soon, normal, oneTime, missing};
}

function groupedHistoryRows(){
  const eduNames = educationTypeNames();
  const latestByWorker={};

  // 교육현황은 기사님 전체를 기준으로 먼저 행을 만들고,
  // 설정의 교육기준 목록을 기준으로 교육 컬럼을 자동 생성합니다.
  // 그래서 아직 이력이 없는 기사님도 교육기준 항목이 빈칸(-)으로 같이 보입니다.
  for(const w of state.workers){
    latestByWorker[String(w.id)] = { worker:w, records:{}, ids:[] };
  }

  for(const h of state.history){
    const key=String(h.worker_id);
    if(!latestByWorker[key]) latestByWorker[key]={worker:null, records:{}, ids:[]};
    const old=latestByWorker[key].records[h.education_name];
    if(!old || String(h.education_date) > String(old.education_date)) latestByWorker[key].records[h.education_name]=h;
    latestByWorker[key].ids.push(h.id);
  }

  const groups=Object.entries(latestByWorker)
    .filter(([workerId,g]) => g.worker)
    .sort((a,b)=>(a[1].worker?.name||"").localeCompare(b[1].worker?.name||""));

  if(!state.workers.length) return `<tr><td colspan="${eduNames.length+3}">등록된 기사님이 없습니다.</td></tr>`;

  return groups.map(([workerId,g])=>{
    const eduCells=eduNames.map(name=>{
      const r=g.records[name];
      if(!r) return `<td><span class="small">-</span></td>`;
      const cycle=(getEducationRule(name)?.cycle_days ?? 365);
      const sch=calcSchedule(r.education_date, cycle);
      return `<td><span class="edu-chip">${escapeHtml(r.education_date)}</span><span class="mini"><span class="badge ${sch.cls}">${sch.dday}</span></span></td>`;
    }).join("");
    const hasHistory = (g.ids || []).length > 0;
    const manageButton = hasHistory ? `<button class="red" onclick="deleteWorkerHistory(${workerId})">해당 기사 이력 삭제</button>` : `<span class="small">이력 없음</span>`;
    return `<tr><td>${escapeHtml(g.worker?.name||"")}</td><td>${escapeHtml(g.worker?.company||"")}</td>${eduCells}<td>${manageButton}</td></tr>`;
  }).join("");
}

async function saveRetentionRule(){
  const name=val("ret-name");
  const years=Number(val("ret-years"));
  const cycle=Number(val("ret-cycle"));
  if(!name) return toast("교육명을 입력하세요.");
  if(Number.isNaN(cycle)) return toast("교육주기(일)는 숫자로 입력하세요. 반복없음은 0입니다.");
  if(Number.isNaN(years) || years < 0) return toast("보관년수는 0 이상의 숫자로 입력하세요.");
  const idxText=val("ret-index");
  const idx=idxText==="" ? -1 : Number(idxText);
  const active=val("ret-active")!=="false";

  const rules=retentionRules().slice();
  const data={education_name:name, retention_years:years, note:val("ret-basis") || val("ret-note"), active};
  const dup=rules.findIndex((r,i)=>i!==idx && r.education_name===name);
  if(dup>=0) return toast("같은 교육명의 보관기준이 이미 있습니다.");
  if(idx>=0) rules[idx]=data; else rules.push(data);
  const ok=await saveRetentionRulesToSettings(rules);
  if(!ok) return;

  const eduRules=educationRules().slice();
  const erIdx=eduRules.findIndex(r=>r.education_name===name);
  const er={education_name:name, category:val("ret-category")||"사용자 지정", cycle_days:cycle, hours:val("ret-hours"), condition:val("ret-condition"), basis:val("ret-basis"), active};
  if(erIdx>=0) eduRules[erIdx]=er; else eduRules.push(er);
  const ok2=await saveRulesToSettings(eduRules);
  if(!ok2) return;
  clearDraftForPage("retention");
  clearRetentionForm(); await loadAll(); toast("보관기준 저장 완료");
}
function editRetentionRule(idx){
  const r=retentionRules()[idx]; if(!r) return;
  const er=getEducationRule(r.education_name) || educationRules().find(x=>x.education_name===r.education_name) || {};
  setVal("ret-index", idx); setVal("ret-name", r.education_name); setVal("ret-years", r.retention_years); setVal("ret-cycle", er.cycle_days ?? ""); setVal("ret-category", er.category || ""); setVal("ret-hours", er.hours || ""); setVal("ret-condition", er.condition || ""); setVal("ret-basis", er.basis || r.note || ""); setVal("ret-active", (r.active===false || er.active===false)?"false":"true"); scrollTo(0,0);
  saveDraftForPage("retention");
}
function clearRetentionForm(){ ["ret-index","ret-name","ret-years","ret-cycle","ret-category","ret-hours","ret-condition","ret-basis","ret-note"].forEach(x=>setVal(x,"")); setVal("ret-active","true"); clearDraftForPage("retention"); }
async function deleteRetentionRule(idx){
  const rules=retentionRules().slice(); const r=rules[idx]; if(!r) return;
  if(!confirm(`${r.education_name} 보관기준을 삭제할까요? 교육이력은 삭제되지 않습니다.`)) return;

}
async function syncRetentionRulesFromEducation(){

      </div>
      <p class="small">여기서 저장한 기준은 교육주기 등록, 기본교육 자동생성, 교육현황 카드의 교육명 목록에 바로 반영됩니다. 주기 0일은 반복 없는 1회성/조건부 교육으로 처리됩니다.</p>
      <div class="actions"><button class="primary" onclick="saveRule()">교육기준 저장</button><button onclick="clearRuleForm()">초기화</button><button onclick="resetDefaultRules()">기본값 복원</button></div>
    </div>

    <div class="card"><h2>교육기준 목록</h2>
      <div class="table-wrap"><table><thead><tr><th>교육명</th><th>주기</th><th>구분</th><th>시간/조건</th><th>대상/조건</th><th>관리근거</th><th>사용</th><th>관리</th></tr></thead><tbody>${ruleRows}</tbody></table></div>
    </div>
    <div class="card"><h2>앱 설치 안내</h2><p>휴대폰 Chrome에서 이 페이지 접속 후 <b>⋮ → 홈 화면에 추가</b>를 누르면 앱처럼 사용할 수 있습니다.</p></div>`;
}

async function saveRulesToSettings(rules){
  const res = await db.from("settings").upsert({key:"education_rules", value:JSON.stringify(rules)});
  if(res.error){ toast("교육기준 저장 오류"); return false; }
  state.settings.education_rules = JSON.stringify(rules);
  return true;
}

async function saveRule(){
  const name = val("rule-name");
  const cycle = Number(val("rule-cycle"));
  if(!name) return toast("교육명을 입력하세요.");
  if(Number.isNaN(cycle)) return toast("주기(일)는 숫자로 입력하세요. 반복없음은 0입니다.");
  const idxText = val("rule-index");
  const idx = idxText === "" ? -1 : Number(idxText);
  const rules = educationRules().slice();
  const data = {
    education_name:name,
    category:val("rule-category") || "사용자 지정",
    cycle_days:cycle,
    hours:val("rule-hours"),
    condition:val("rule-condition"),
    basis:val("rule-basis"),
    active:val("rule-active") !== "false"
  };
  const dup = rules.findIndex((r,i)=>i!==idx && r.education_name===name);
  if(dup >= 0) return toast("같은 교육명이 이미 있습니다.");
  if(idx >= 0) rules[idx] = data; else rules.push(data);
  const ok = await saveRulesToSettings(rules);
  if(!ok) return;
  clearDraftForPage("settings");
  clearRuleForm();
  await loadAll();
  toast("교육기준 저장 완료");
}

function editRule(idx){
  const r = educationRules()[idx];
  if(!r) return;
  setVal("rule-index", idx);
  setVal("rule-name", r.education_name);
  setVal("rule-category", r.category);
  setVal("rule-cycle", r.cycle_days);
  setVal("rule-hours", r.hours);
  setVal("rule-condition", r.condition);
  setVal("rule-basis", r.basis);
  setVal("rule-active", r.active===false?"false":"true");
  scrollTo(0,0);
}
function clearRuleForm(){ ["rule-index","rule-name","rule-category","rule-cycle","rule-hours","rule-condition","rule-basis"].forEach(x=>setVal(x,"")); setVal("rule-active","true"); clearDraftForPage("settings"); }
async function deleteRule(idx){
  const rules = educationRules().slice();
  const r = rules[idx];
  if(!r) return;
  if(!confirm(`${r.education_name} 교육기준을 삭제할까요? 기존 교육이력은 삭제되지 않습니다.`)) return;
  rules.splice(idx,1);
  const ok = await saveRulesToSettings(rules);
  if(!ok) return;
  await loadAll();
  toast("교육기준 삭제 완료");
}
async function resetDefaultRules(){
  if(!confirm("교육기준을 기본값으로 복원할까요? 현재 수정한 기준표는 덮어쓰기 됩니다.")) return;
  const ok = await saveRulesToSettings(DEFAULT_EDUCATION_RULES);
  if(!ok) return;
  await loadAll();
  toast("기본 교육기준 복원 완료");
}

async function saveSettings(){ const value=val("sms-template"); const res=await db.from("settings").upsert({key:"sms_template", value}); if(res.error)return toast("저장 오류"); clearDraftForPage("settings"); await loadAll(); toast("저장 완료"); }

function draftPrefix(page=currentPage){ return `educationSystemDraft:${page}:`; }
function draftEnabledPage(page=currentPage){ return !["mobile","dashboard"].includes(page); }
function saveDraftForPage(page=currentPage){
  if(!draftEnabledPage(page)) return;
  document.querySelectorAll(`#page-${page} input, #page-${page} select, #page-${page} textarea`).forEach(el=>{
    if(!el.id) return;
    localStorage.setItem(draftPrefix(page)+el.id, el.value ?? "");
  });
}
function restoreDraftForPage(page=currentPage){
  if(!draftEnabledPage(page)) return;
  document.querySelectorAll(`#page-${page} input, #page-${page} select, #page-${page} textarea`).forEach(el=>{
    if(!el.id) return;
    const key=draftPrefix(page)+el.id;
    const saved=localStorage.getItem(key);
    if(saved!==null && saved!=="") el.value=saved;
  });
}
function clearDraftForPage(page=currentPage){
  const prefix=draftPrefix(page);
  Object.keys(localStorage).filter(k=>k.startsWith(prefix)).forEach(k=>localStorage.removeItem(k));
}
function bindDraftInputs(){
  if(!draftEnabledPage(currentPage)) return;
  restoreDraftForPage(currentPage);
  document.querySelectorAll(`#page-${currentPage} input, #page-${currentPage} select, #page-${currentPage} textarea`).forEach(el=>{
    if(!el.id || el.dataset.draftBound==="1") return;
    el.dataset.draftBound="1";
    el.addEventListener("input",()=>saveDraftForPage(currentPage));
    el.addEventListener("change",()=>saveDraftForPage(currentPage));
  });
}

function val(id){ return document.getElementById(id)?.value?.trim() ?? ""; }
function setVal(id,v){ const el=document.getElementById(id); if(el) el.value=v ?? ""; }

window.addEventListener("keydown", (e) => { if (e.key === "Escape") closeMenu(); });

window.addEventListener("load", async () => {
  if (!ready()) return;
  await loadAll();
  showPage("mobile");
});
</script>
</body>
</html>
