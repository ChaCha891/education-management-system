<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>교육관리 시스템</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg:#f5f7fa; --card:#fff; --line:#d9dee7; --text:#1f2937; --muted:#6b7280;
      --primary:#2563eb; --primary-dark:#1d4ed8; --green:#16a34a; --red:#dc2626; --yellow:#f59e0b;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
    .header{position:sticky;top:0;z-index:10;background:#fff;border-bottom:1px solid var(--line);padding:16px;display:flex;gap:12px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    h1{font-size:22px;margin:0}.nav{display:flex;gap:8px;flex-wrap:wrap}.container{max-width:1220px;margin:0 auto;padding:16px}
    button,.btn{border:0;border-radius:12px;padding:10px 14px;background:#eef2f7;color:#111827;font-weight:800;cursor:pointer;text-decoration:none;display:inline-block;text-align:center;font-size:14px}
    button.primary,.btn.primary{background:var(--primary);color:#fff}button.green,.btn.green{background:var(--green);color:#fff}button.red,.btn.red{background:var(--red);color:#fff}
    button.active{background:var(--primary);color:#fff}.card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:16px;margin-bottom:14px;box-shadow:0 6px 18px rgba(31,41,55,.05)}
    h2{font-size:18px;margin:0 0 12px}.small{font-size:13px;color:var(--muted)}.left{text-align:left}.mini{display:block;font-size:12px;color:var(--muted);margin-top:4px}.info{background:#e0f2fe;color:#075985}.danger-text{color:#dc2626}.warn-text{color:#b45309}.ok-text{color:#166534}
    .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.form-row{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:10px}
    label{font-size:13px;color:var(--muted);font-weight:800;display:block;margin-bottom:5px}input,select,textarea{width:100%;padding:10px;border:1px solid var(--line);border-radius:12px;font-size:14px;background:#fff}textarea{min-height:95px;resize:vertical}
    .actions{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}.table-wrap{overflow:auto;border:1px solid var(--line);border-radius:14px}table{width:100%;border-collapse:collapse;background:#fff}th,td{border-bottom:1px solid #edf0f5;padding:10px;text-align:center;font-size:14px;white-space:nowrap}th{background:#eef2f7;font-weight:900}tr:last-child td{border-bottom:0}
    .badge{display:inline-block;padding:5px 8px;border-radius:999px;font-weight:900;font-size:12px}.edu-chip{display:inline-block;margin:3px;padding:6px 9px;border-radius:999px;background:#eef2f7;font-weight:800;font-size:12px}.due{background:#fee2e2;color:#991b1b}.soon{background:#fef3c7;color:#92400e}.ok{background:#dcfce7;color:#166534}
    .hidden{display:none!important}.mobile-card{border:1px solid var(--line);border-radius:16px;padding:14px;margin-bottom:12px;background:#fff}
    .toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#111827;color:#fff;padding:12px 16px;border-radius:999px;display:none;z-index:99}
    @media(max-width:760px){.header{align-items:flex-start}.nav,.nav button{width:100%}.container{padding:12px}.grid,.grid3,.form-row{grid-template-columns:1fr}button,.btn{width:100%}th,td{font-size:13px;padding:8px}h1{font-size:19px}}
  </style>
</head>
<body>
  <div class="header">
    <h1>교육관리 시스템</h1>
    <div class="nav">
      <button onclick="showPage('mobile')" id="nav-mobile">현장 모바일</button>
      <button onclick="showPage('dashboard')" id="nav-dashboard">PC 대시보드</button>
      <button onclick="showPage('workers')" id="nav-workers">기사님</button>
      <button onclick="showPage('education')" id="nav-education">교육주기</button>
      <button onclick="showPage('history')" id="nav-history">교육현황</button>
      <button onclick="showPage('equipment')" id="nav-equipment">장비관리</button>
      <button onclick="showPage('settings')" id="nav-settings">설정</button>
    </div>
  </div>

  <div class="container">
    <div id="setup-warning" class="card hidden">
      <h2>Supabase 연결 설정 필요</h2>
      <p class="small">HTML 파일 상단의 SUPABASE_URL, SUPABASE_ANON_KEY 값을 본인 Supabase 프로젝트 값으로 바꿔야 작동합니다.</p>
    </div>

    <section id="page-mobile" class="page"></section>
    <section id="page-dashboard" class="page hidden"></section>
    <section id="page-workers" class="page hidden"></section>
    <section id="page-education" class="page hidden"></section>
    <section id="page-history" class="page hidden"></section>
    <section id="page-equipment" class="page hidden"></section>
    <section id="page-settings" class="page hidden"></section>
  </div>

  <div id="toast" class="toast"></div>

<script>
// =========================
// 1) 여기에 Supabase 값을 넣으세요.
// =========================
const SUPABASE_URL = "https://widvjrtvjjuvknpjujkf.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndpZHZqcnR2amp1dmtucGp1amtmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0ODY0NzIsImV4cCI6MjA5NDA2MjQ3Mn0.ThmHVS56_yf1L3yGq8sJHBtSiLHu8javo5aboqwvKBA";

const DEFAULT_TEMPLATE = `[교육 안내]\n{name} 기사님, {education} 일정 안내드립니다.\n교육 예정일: {next_date} ({dday})\n기한 내 교육 이수 부탁드립니다.`;
// 기본 교육기준표: 최초 실행 또는 설정값이 없을 때만 사용합니다.
// 이후에는 [설정] 화면에서 추가/수정/삭제한 education_rules 설정값을 우선 사용합니다.
const DEFAULT_EDUCATION_RULES = [
  { education_name: "MSDS 안전보건교육", category: "반복/변경 시", cycle_days: 365, hours: "물질 변경/신규 취급 시 별도", condition: "MSDS 대상물질 취급자", basis: "MSDS 교육 관리", active: true },
  { education_name: "신규채용자 안전보건교육", category: "1회성", cycle_days: 0, hours: "최초 1회", condition: "신규 투입자", basis: "채용 시 교육", active: true },
  { education_name: "특별안전보건교육", category: "조건부", cycle_days: 0, hours: "작업 투입/변경 시", condition: "특별교육 대상작업 투입자", basis: "특별교육 대상작업", active: true },
  { education_name: "정기안전보건교육", category: "반복", cycle_days: 90, hours: "분기 단위 관리", condition: "정기교육 대상자", basis: "정기교육 관리", active: true },
  { education_name: "출입교육", category: "반복", cycle_days: 365, hours: "현장 기준", condition: "협력업체 및 외부 출입자", basis: "사업장 출입·협력업체 관리 기준", active: true }
];

let db = null;
let state = { workers: [], education: [], history: [], equipment: [], settings: {}, due: [] };
let currentPage = "mobile";

function ready() {
  if (SUPABASE_URL.includes("YOUR_") || SUPABASE_ANON_KEY.includes("YOUR_")) {
    document.getElementById("setup-warning").classList.remove("hidden");
    return false;
  }
  db = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  return true;
}

function toast(msg) {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.style.display = "block";
  setTimeout(() => t.style.display = "none", 1800);
}

function todayStr() { return new Date().toISOString().slice(0,10); }
function addDays(dateText, days) {
  const d = new Date(dateText + "T00:00:00");
  d.setDate(d.getDate() + Number(days));
  return d;
}
function formatDate(d) {
  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");
  return `${y}-${m}-${day}`;
}
function remainDays(target) {
  const today = new Date(todayStr() + "T00:00:00");
  return Math.round((target - today) / (1000*60*60*24));
}
function ddayText(remain) {
  if (remain === null || remain === undefined || Number.isNaN(remain)) return "반복없음";
  if (remain < 0) return `D+${Math.abs(remain)}`;
  if (remain === 0) return "D-Day";
  return `D-${remain}`;
}
function isOneTimeCycle(cycleDays){ return Number(cycleDays) <= 0; }
function educationRules(){
  try {
    const parsed = JSON.parse(state.settings.education_rules || "");
    if (Array.isArray(parsed)) return parsed;
  } catch(e) {}
  return DEFAULT_EDUCATION_RULES;
}
function activeEducationRules(){ return educationRules().filter(r => r.active !== false); }
function educationTypeNames(){ return activeEducationRules().map(r => r.education_name).filter(Boolean); }
function getEducationRule(name){ return activeEducationRules().find(r => r.education_name === name) || null; }
function educationMeta(name){ const r=getEducationRule(name); return r ? `${r.category || "구분없음"} · ${r.hours || "시간/조건 미입력"}` : "사용자 지정"; }
function calcSchedule(lastDate, cycleDays){
  if(!lastDate) return { nextText:"-", remain:null, dday:"-", cls:"gray", status:"미등록" };
  if(isOneTimeCycle(cycleDays)) return { nextText:"반복없음", remain:null, dday:"완료", cls:"info", status:"이수" };
  const nd=addDays(lastDate, cycleDays);
  const remain=remainDays(nd);
  const status=remain<0?"기한초과":remain<=14?"임박":"정상";
  return { nextText:formatDate(nd), remain, dday:ddayText(remain), cls:badgeClass(remain), status };
}
function badgeClass(remain) {
  if (remain === null || remain === undefined || Number.isNaN(remain)) return "info";
  if (remain < 0) return "due";
  if (remain <= 14) return "soon";
  return "ok";
}
function escapeHtml(v) {
  return String(v ?? "").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;");
}
function smsBody(item) {
  const template = state.settings.sms_template || DEFAULT_TEMPLATE;
  return template
    .replaceAll("{name}", item.name || "")
    .replaceAll("{education}", item.education_name || "")
    .replaceAll("{next_date}", item.next_date || "")
    .replaceAll("{dday}", item.dday || "")
    .replaceAll("{phone}", item.phone || "");
}
function smsLink(item) {
  const phone = String(item.phone || "").replaceAll("-","").replaceAll(" ","");
  return `sms:${phone}?body=${encodeURIComponent(smsBody(item))}`;
}

async function loadAll() {
  if (!db) return;
  const [w, e, h, eq, s] = await Promise.all([
    db.from("workers").select("*").order("name"),
    db.from("education_records").select("*").order("education_name"),
    db.from("training_history").select("*").order("education_date", { ascending:false }),
    db.from("equipment").select("*").order("no"),
    db.from("settings").select("*")
  ]);
  if (w.error || e.error || h.error || eq.error || s.error) {
    toast("DB 조회 오류: 테이블 생성 여부를 확인하세요.");
    console.error(w.error || e.error || h.error || eq.error || s.error);
    return;
  }
  state.workers = w.data || [];
  state.education = e.data || [];
  state.history = h.data || [];
  state.equipment = eq.data || [];
  state.settings = {};
  (s.data || []).forEach(x => state.settings[x.key] = x.value);
  if (!state.settings.sms_template) state.settings.sms_template = DEFAULT_TEMPLATE;
  if (!state.settings.education_rules) state.settings.education_rules = JSON.stringify(DEFAULT_EDUCATION_RULES);
  makeDue();
  renderCurrent();
}

function latestHistoryDate(workerId, educationName) {
  const dates = state.history
    .filter(h => Number(h.worker_id) === Number(workerId) && h.education_name === educationName)
    .map(h => h.education_date)
    .filter(Boolean)
    .sort()
    .reverse();
  return dates[0] || "";
}

function effectiveLastDate(e) {
  // 교육현황에 같은 기사님/같은 교육명의 최신 이력이 있으면 그것을 최근교육일자로 사용
  return latestHistoryDate(e.worker_id, e.education_name) || e.last_date;
}

function makeDue() {
  const workerMap = Object.fromEntries(state.workers.map(w => [w.id, w]));
  const result = [];
  for (const e of state.education) {
    const w = workerMap[e.worker_id];
    if (!w) continue;
    const last = effectiveLastDate(e);
    const sch = calcSchedule(last, e.cycle_days);
    if (sch.remain !== null && sch.remain <= 30) {
      result.push({ ...e, name:w.name, phone:w.phone || "", company:w.company || "", last_date:last, next_date:sch.nextText, remain:sch.remain, dday:sch.dday, status:sch.status });
    }
  }
  result.sort((a,b) => a.remain - b.remain || a.name.localeCompare(b.name));
  state.due = result;
}

function dashboardStats(){
  let overdue=0, soon=0, normal=0, oneTime=0;
  for(const e of state.education){
    const sch=calcSchedule(effectiveLastDate(e), e.cycle_days);
    if(sch.remain===null) oneTime++;
    else if(sch.remain<0) overdue++;
    else if(sch.remain<=14) soon++;
    else normal++;
  }
  return {overdue, soon, normal, oneTime};
}

function showPage(page) {
  currentPage = page;
  document.querySelectorAll(".page").forEach(x => x.classList.add("hidden"));
  document.getElementById(`page-${page}`).classList.remove("hidden");
  document.querySelectorAll(".nav button").forEach(x => x.classList.remove("active"));
  document.getElementById(`nav-${page}`).classList.add("active");
  renderCurrent();
}
function renderCurrent() {
  if (currentPage === "mobile") renderMobile();
  if (currentPage === "dashboard") renderDashboard();
  if (currentPage === "workers") renderWorkers();
  if (currentPage === "education") renderEducation();
  if (currentPage === "history") renderHistory();
  if (currentPage === "equipment") renderEquipment();
  if (currentPage === "settings") renderSettings();
}

function renderMobile() {
  const cards = state.due.length ? state.due.map(x => `
    <div class="mobile-card">
      <h2>${escapeHtml(x.name)} 기사님</h2>
      <p><b>교육:</b> ${escapeHtml(x.education_name)} <span class="mini">${escapeHtml(educationMeta(x.education_name))}</span></p>
      <p><b>최근교육일:</b> ${escapeHtml(x.last_date || "-")}</p>
      <p><b>예정일:</b> ${x.next_date} <span class="badge ${badgeClass(x.remain)}">${x.dday}</span></p>
      <p><b>연락처:</b> ${escapeHtml(x.phone || "연락처 없음")}</p>
      <textarea readonly>${escapeHtml(smsBody(x))}</textarea>
      <div class="actions"><a class="btn primary" href="${smsLink(x)}">문자앱 열기</a><button class="green" onclick="completeEducation(${x.id})">교육완료</button></div>
      <p class="small">교육완료를 누르면 교육현황과 교육주기가 동시에 갱신됩니다.</p>
    </div>`).join("") : `<div class="card"><h2>현재 교육 임박자가 없습니다.</h2><p class="small">표시 기준: 기한초과 전체 + D-30 이내</p></div>`;
  document.getElementById("page-mobile").innerHTML = `
    <div class="card"><h2>현장용 화면</h2><p class="small">문자 발송 → 교육완료 처리까지 휴대폰에서 바로 처리합니다.</p><div class="actions"><button onclick="loadAll()">새로고침</button></div></div>
    ${cards}`;
}

function renderDashboard() {
  const st=dashboardStats();
  const rows = state.due.slice(0,50).map(x => `<tr><td>${escapeHtml(x.name)}</td><td>${escapeHtml(x.company)}</td><td>${escapeHtml(x.education_name)}</td><td>${escapeHtml(x.last_date||"-")}</td><td>${x.next_date}</td><td><span class="badge ${badgeClass(x.remain)}">${x.dday}</span></td><td>${escapeHtml(x.phone)}</td><td><button class="green" onclick="completeEducation(${x.id})">완료</button></td></tr>`).join("") || `<tr><td colspan="8">현재 교육 임박자가 없습니다.</td></tr>`;
  document.getElementById("page-dashboard").innerHTML = `
    <div class="grid3">
      <div class="card"><h2>${state.workers.length}명</h2><p class="small">등록 기사님</p></div>
      <div class="card"><h2>${st.overdue}건</h2><p class="small danger-text">기한초과</p></div>
      <div class="card"><h2>${st.soon}건</h2><p class="small warn-text">14일 이내 임박</p></div>
      <div class="card"><h2>${state.education.length}건</h2><p class="small">관리 중 교육주기</p></div>
      <div class="card"><h2>${st.normal}건</h2><p class="small ok-text">정상 관리</p></div>
      <div class="card"><h2>${state.equipment.length}대</h2><p class="small">장비</p></div>
    </div>
    <div class="card"><h2>우선 처리 목록</h2><p class="small">기한초과 전체와 D-30 이내 교육만 표시합니다. 완료 버튼으로 즉시 교육현황까지 반영됩니다.</p><div class="table-wrap"><table><thead><tr><th>기사님</th><th>소속</th><th>교육내용</th><th>최근교육일</th><th>예정일</th><th>D-Day</th><th>연락처</th><th>처리</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

function workerOptions(selected="") {
  return state.workers.map(w => `<option value="${w.id}" ${String(selected)===String(w.id)?"selected":""}>${escapeHtml(w.name)}</option>`).join("");
}
function eduOptions() {
  return educationTypeNames().map(x => `<option value="${escapeHtml(x)}"></option>`).join("");
}

function renderWorkers() {
  const rows = state.workers.map(w => `<tr><td>${escapeHtml(w.name)}</td><td>${escapeHtml(w.birth)}</td><td>${escapeHtml(w.phone)}</td><td>${escapeHtml(w.company)}</td><td>${escapeHtml(w.note)}</td><td><button onclick="editWorker(${w.id})">수정</button> <button class="red" onclick="deleteWorker(${w.id})">삭제</button></td></tr>`).join("") || `<tr><td colspan="6">등록된 기사님이 없습니다.</td></tr>`;
  document.getElementById("page-workers").innerHTML = `
    <div class="card"><h2>기사님 등록/수정</h2><input type="hidden" id="worker-id"><div class="form-row"><div><label>이름</label><input id="worker-name"></div><div><label>생년월일</label><input id="worker-birth" placeholder="YYYY-MM-DD"></div><div><label>연락처</label><input id="worker-phone" placeholder="010-0000-0000"></div><div><label>소속</label><input id="worker-company"></div></div><div><label>비고</label><input id="worker-note"></div><div class="actions"><button class="primary" onclick="saveWorker()">저장</button><button onclick="clearWorkerForm()">초기화</button></div></div>
    <div class="card"><h2>기사님 목록</h2><div class="table-wrap"><table><thead><tr><th>이름</th><th>생년월일</th><th>연락처</th><th>소속</th><th>비고</th><th>관리</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}
async function saveWorker() {
  const id = document.getElementById("worker-id").value;
  const data = { name:val("worker-name"), birth:val("worker-birth"), phone:val("worker-phone"), company:val("worker-company"), note:val("worker-note") };
  if (!data.name) return toast("이름을 입력하세요.");
  const res = id ? await db.from("workers").update(data).eq("id", id) : await db.from("workers").insert(data);
  if (res.error) return toast("저장 오류");
  clearWorkerForm(); await loadAll(); toast("저장 완료");
}
function editWorker(id) { const w = state.workers.find(x=>x.id===id); if(!w) return; setVal("worker-id",w.id); setVal("worker-name",w.name); setVal("worker-birth",w.birth); setVal("worker-phone",w.phone); setVal("worker-company",w.company); setVal("worker-note",w.note); scrollTo(0,0); }
function clearWorkerForm(){ ["worker-id","worker-name","worker-birth","worker-phone","worker-company","worker-note"].forEach(x=>setVal(x,"")); }
async function deleteWorker(id){ if(!confirm("삭제할까요? 관련 교육주기/이력도 같이 정리해야 합니다.")) return; await db.from("education_records").delete().eq("worker_id",id); await db.from("training_history").delete().eq("worker_id",id); await db.from("workers").delete().eq("id",id); await loadAll(); }

function renderEducation() {
  const workerMap = Object.fromEntries(state.workers.map(w=>[w.id,w]));
  const rows = state.education.map(e => {
    const w=workerMap[e.worker_id];
    const last=effectiveLastDate(e);
    const sch=calcSchedule(last,e.cycle_days);
    return `<tr><td>${escapeHtml(w?.name||"")}</td><td>${escapeHtml(w?.company||"")}</td><td class="left">${escapeHtml(e.education_name)}<span class="mini">${escapeHtml(educationMeta(e.education_name))}</span></td><td>${escapeHtml(last||"-")}</td><td>${isOneTimeCycle(e.cycle_days)?"반복없음":e.cycle_days}</td><td>${sch.nextText}</td><td><span class="badge ${sch.cls}">${sch.dday}</span></td><td><button class="green" onclick="completeEducation(${e.id})">교육완료</button> <button onclick="editEducation(${e.id})">수정</button> <button class="red" onclick="deleteEducation(${e.id})">삭제</button></td></tr>`;
  }).join("") || `<tr><td colspan="8">등록된 교육주기가 없습니다.</td></tr>`;
  document.getElementById("page-education").innerHTML = `
    <div class="card"><h2>교육주기 등록/수정</h2><input type="hidden" id="edu-id"><div class="form-row"><div><label>기사님</label><select id="edu-worker">${workerOptions()}</select></div><div><label>교육명</label><input id="edu-name" list="edu-list" oninput="applyEducationRuleToForm()"><datalist id="edu-list">${eduOptions()}</datalist></div><div><label>최근 교육일</label><input id="edu-last" value="${todayStr()}"></div><div><label>주기(일)</label><input id="edu-cycle" placeholder="교육명 선택 시 자동"></div></div><p id="edu-rule-help" class="small">교육명을 선택하면 기본 주기가 자동 입력됩니다. 0일은 1회성 교육으로 관리됩니다.</p><div class="actions"><button class="primary" onclick="saveEducation()">저장</button><button onclick="clearEduForm()">초기화</button><button class="green" onclick="bulkCreateDefaultEducation()">전체 기사 기본교육 자동생성</button></div></div>
    <div class="card"><h2>교육주기 목록</h2><p class="small">최근교육일은 교육현황의 최신 이수일을 우선 반영합니다. 교육완료 버튼을 누르면 D-Day가 새 주기로 재시작됩니다.</p><div class="table-wrap"><table><thead><tr><th>기사님</th><th>소속</th><th>교육명</th><th>최근 교육일</th><th>주기</th><th>다음 교육일</th><th>D-Day</th><th>관리</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}
async function saveEducation(){
  const id=val("edu-id");
  const data={ worker_id:Number(val("edu-worker")), education_name:val("edu-name"), last_date:val("edu-last"), cycle_days:Number(val("edu-cycle")) };
  if(!data.worker_id||!data.education_name||!data.last_date||Number.isNaN(data.cycle_days)) return toast("모두 입력하세요.");
  const res=id?await db.from("education_records").update(data).eq("id",id):await db.from("education_records").insert(data);
  if(res.error)return toast("저장 오류");
  await upsertEducationHistory(data.worker_id, data.education_name, data.last_date, "교육주기 등록/수정 반영");
  clearEduForm(); await loadAll(); toast("교육주기 저장 완료");
}

function applyEducationRuleToForm(){
  const name=val("edu-name");
  const rule=getEducationRule(name);
  const help=document.getElementById("edu-rule-help");
  if(rule){
    setVal("edu-cycle", Number(rule.cycle_days));
    if(help) help.textContent=`자동 적용: ${name} / ${rule.category || "구분없음"} / 주기 ${Number(rule.cycle_days)===0?"반복없음":Number(rule.cycle_days)+"일"} / ${rule.hours || "시간/조건 미입력"} / ${rule.basis || "관리근거 미입력"}`;
  }else{
    if(help) help.textContent="사용자 지정 교육입니다. 주기일을 직접 입력하세요. 0일은 1회성으로 처리됩니다.";
  }
}

async function bulkCreateDefaultEducation(){
  if(!state.workers.length) return toast("등록된 기사님이 없습니다.");
  if(!confirm("모든 기사님에게 기본교육 5종을 없는 항목만 자동 생성할까요?")) return;
  const rows=[];
  for(const w of state.workers){
    for(const name of educationTypeNames()){
      const exists=state.education.some(e=>Number(e.worker_id)===Number(w.id) && e.education_name===name);
      if(!exists){
        const rule=getEducationRule(name);
        rows.push({ worker_id:w.id, education_name:name, last_date:todayStr(), cycle_days:rule?Number(rule.cycle_days):365 });
      }
    }
  }
  if(!rows.length) return toast("추가할 기본교육이 없습니다.");
  const res=await db.from("education_records").insert(rows);
  if(res.error) return toast("자동생성 오류");
  for(const r of rows) await upsertEducationHistory(r.worker_id, r.education_name, r.last_date, "기본교육 자동생성");
  await loadAll();
  toast(`${rows.length}건 자동생성 완료`);
}

function editEducation(id){ const e=state.education.find(x=>x.id===id); if(!e)return; setVal("edu-id",e.id); setVal("edu-worker",e.worker_id); setVal("edu-name",e.education_name); setVal("edu-last",e.last_date); setVal("edu-cycle",e.cycle_days); scrollTo(0,0); }
function clearEduForm(){ ["edu-id","edu-name","edu-cycle"].forEach(x=>setVal(x,"")); setVal("edu-last",todayStr()); }
async function deleteEducation(id){ if(!confirm("삭제할까요?")) return; await db.from("education_records").delete().eq("id",id); await loadAll(); }

function groupedHistoryRows(){
  const workerMap=Object.fromEntries(state.workers.map(w=>[w.id,w]));
  const five=new Date(); five.setFullYear(five.getFullYear()-5);
  const latestByWorker={};
  for(const h of state.history.filter(h=>new Date(h.education_date)>=five)){
    const key=String(h.worker_id);
    if(!latestByWorker[key]) latestByWorker[key]={worker:workerMap[h.worker_id], records:{}, ids:[]};
    const old=latestByWorker[key].records[h.education_name];
    if(!old || String(h.education_date) > String(old.education_date)) latestByWorker[key].records[h.education_name]=h;
    latestByWorker[key].ids.push(h.id);
  }
  const groups=Object.entries(latestByWorker).sort((a,b)=>(a[1].worker?.name||"").localeCompare(b[1].worker?.name||""));
  if(!groups.length) return `<tr><td colspan="${educationTypeNames().length+3}">최근 5년 교육 이력이 없습니다.</td></tr>`;
  return groups.map(([workerId,g])=>{
    const eduCells=educationTypeNames().map(name=>{
      const r=g.records[name];
      if(!r) return `<td>-</td>`;
      const rec=state.education.find(e=>Number(e.worker_id)===Number(workerId) && e.education_name===name);
      const cycle=rec ? rec.cycle_days : (getEducationRule(name)?.cycle_days ?? 365);
      const sch=calcSchedule(r.education_date, cycle);
      return `<td><span class="edu-chip">${escapeHtml(r.education_date)}</span><span class="mini"><span class="badge ${sch.cls}">${sch.dday}</span></span></td>`;
    }).join("");
    return `<tr><td>${escapeHtml(g.worker?.name||"")}</td><td>${escapeHtml(g.worker?.company||"")}</td>${eduCells}<td><button class="red" onclick="deleteWorkerHistory(${workerId})">해당 기사 이력 삭제</button></td></tr>`;
  }).join("");
}

function renderHistory(){
  const eduHeads=educationTypeNames().map(x=>`<th>${escapeHtml(x)}</th>`).join("");
  const rows=groupedHistoryRows();
  document.getElementById("page-history").innerHTML=`<div class="card"><h2>교육현황 입력</h2><div class="form-row"><div><label>기사님</label><select id="hist-worker">${workerOptions()}</select></div><div><label>교육내용</label><input id="hist-name" list="hist-list"><datalist id="hist-list">${eduOptions()}</datalist></div><div><label>교육일자</label><input id="hist-date" value="${todayStr()}"></div><div><label>비고</label><input id="hist-note"></div></div><div class="actions"><button class="primary" onclick="saveHistory()">교육 이력 저장</button></div></div><div class="card"><h2>기사님별 교육카드</h2><p class="small">기사님 한 명을 한 줄로 묶고, 각 교육 칸에는 최신 이수일과 현재 D-Day 상태를 함께 표시합니다.</p><div class="table-wrap"><table><thead><tr><th>기사님</th><th>소속</th>${eduHeads}<th>관리</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}

async function upsertEducationHistory(workerId, educationName, educationDate, note=""){
  const existing = state.history.find(h => Number(h.worker_id)===Number(workerId) && h.education_name===educationName);
  const data={worker_id:Number(workerId),education_name:educationName,education_date:educationDate,note};
  if(existing) return await db.from("training_history").update(data).eq("id", existing.id);
  return await db.from("training_history").insert(data);
}

async function syncEducationRecordLastDate(workerId, educationName, educationDate){
  const match=state.education.find(e=>Number(e.worker_id)===Number(workerId) && e.education_name===educationName);
  if(match) await db.from("education_records").update({ last_date: educationDate }).eq("id", match.id);
}

async function saveHistory(){
  const data={worker_id:Number(val("hist-worker")),education_name:val("hist-name"),education_date:val("hist-date"),note:val("hist-note")};
  if(!data.worker_id||!data.education_name||!data.education_date)return toast("모두 입력하세요.");
  const res=await upsertEducationHistory(data.worker_id,data.education_name,data.education_date,data.note);
  if(res.error)return toast("저장 오류");
  await syncEducationRecordLastDate(data.worker_id,data.education_name,data.education_date);
  await loadAll();
  toast("교육현황 및 교육주기 자동 업데이트 완료");
}
async function deleteHistory(id){ if(!confirm("삭제할까요?"))return; await db.from("training_history").delete().eq("id",id); await loadAll(); }
async function deleteWorkerHistory(workerId){ if(!confirm("해당 기사님의 교육이력을 모두 삭제할까요?"))return; await db.from("training_history").delete().eq("worker_id",workerId); await loadAll(); }

function renderEquipment(){
  const rows=state.equipment.map(e=>`<tr><td>${escapeHtml(e.no)}</td><td>${escapeHtml(e.vehicle_type)}</td><td>${escapeHtml(e.work_type)}</td><td>${escapeHtml(e.vehicle_number)}</td><td>${escapeHtml(e.note)}</td><td><button onclick="editEquipment(${e.id})">수정</button> <button class="red" onclick="deleteEquipment(${e.id})">삭제</button></td></tr>`).join("")||`<tr><td colspan="6">등록된 장비가 없습니다.</td></tr>`;
  document.getElementById("page-equipment").innerHTML=`<div class="card"><h2>장비 등록/수정</h2><input type="hidden" id="eq-id"><div class="form-row"><div><label>No.</label><input id="eq-no"></div><div><label>차종</label><input id="eq-type"></div><div><label>작업종류</label><input id="eq-work"></div><div><label>차넘버</label><input id="eq-number"></div></div><div><label>비고</label><input id="eq-note"></div><div class="actions"><button class="primary" onclick="saveEquipment()">저장</button><button onclick="clearEqForm()">초기화</button></div></div><div class="card"><h2>장비 목록</h2><div class="table-wrap"><table><thead><tr><th>No.</th><th>차종</th><th>작업종류</th><th>차넘버</th><th>비고</th><th>관리</th></tr></thead><tbody>${rows}</tbody></table></div></div>`;
}
async function saveEquipment(){ const id=val("eq-id"); const data={no:val("eq-no"),vehicle_type:val("eq-type"),work_type:val("eq-work"),vehicle_number:val("eq-number"),note:val("eq-note")}; const res=id?await db.from("equipment").update(data).eq("id",id):await db.from("equipment").insert(data); if(res.error)return toast("저장 오류"); clearEqForm(); await loadAll(); }
function editEquipment(id){ const e=state.equipment.find(x=>x.id===id); if(!e)return; setVal("eq-id",e.id); setVal("eq-no",e.no); setVal("eq-type",e.vehicle_type); setVal("eq-work",e.work_type); setVal("eq-number",e.vehicle_number); setVal("eq-note",e.note); scrollTo(0,0); }
function clearEqForm(){ ["eq-id","eq-no","eq-type","eq-work","eq-number","eq-note"].forEach(x=>setVal(x,"")); }
async function deleteEquipment(id){ if(!confirm("삭제할까요?"))return; await db.from("equipment").delete().eq("id",id); await loadAll(); }

function renderSettings(){
  const rules = educationRules();
  const ruleRows = rules.map((r, idx)=>`<tr>
    <td>${escapeHtml(r.education_name)}</td>
    <td>${Number(r.cycle_days)===0?"반복없음":escapeHtml(r.cycle_days)+"일"}</td>
    <td>${escapeHtml(r.category)}</td>
    <td>${escapeHtml(r.hours)}</td>
    <td>${escapeHtml(r.condition)}</td>
    <td class="left">${escapeHtml(r.basis)}</td>
    <td>${r.active===false?"미사용":"사용"}</td>
    <td><button onclick="editRule(${idx})">수정</button> <button class="red" onclick="deleteRule(${idx})">삭제</button></td>
  </tr>`).join("") || `<tr><td colspan="8">등록된 교육기준이 없습니다.</td></tr>`;
  document.getElementById("page-settings").innerHTML=`
    <div class="card"><h2>문자 기본문구</h2><p class="small">치환값: {name}, {education}, {next_date}, {dday}, {phone}</p><textarea id="sms-template">${escapeHtml(state.settings.sms_template||DEFAULT_TEMPLATE)}</textarea><div class="actions"><button class="primary" onclick="saveSettings()">문구 저장</button></div></div>

    <div class="card"><h2>교육기준 등록/수정</h2>
      <input type="hidden" id="rule-index">
      <div class="form-row">
        <div><label>교육명</label><input id="rule-name" placeholder="예: 출입교육"></div>
        <div><label>구분</label><input id="rule-category" placeholder="예: 반복 / 1회성 / 조건부"></div>
        <div><label>주기(일)</label><input id="rule-cycle" placeholder="365, 90, 0"></div>
        <div><label>사용 여부</label><select id="rule-active"><option value="true">사용</option><option value="false">미사용</option></select></div>
      </div>
      <div class="form-row">
        <div><label>시간/조건</label><input id="rule-hours" placeholder="예: 분기 6시간, 최초 1회"></div>
        <div><label>대상/조건</label><input id="rule-condition" placeholder="예: 신규 투입자, MSDS 대상물질 취급자"></div>
        <div style="grid-column:span 2"><label>관리근거</label><input id="rule-basis" placeholder="예: 산업안전보건법 시행규칙, 사업장 출입 기준 등"></div>
      </div>
      <p class="small">여기서 저장한 기준은 교육주기 등록, 기본교육 자동생성, 교육현황 카드의 교육명 목록에 바로 반영됩니다. 주기 0일은 반복 없는 1회성/조건부 교육으로 처리됩니다.</p>
      <div class="actions"><button class="primary" onclick="saveRule()">교육기준 저장</button><button onclick="clearRuleForm()">초기화</button><button onclick="resetDefaultRules()">기본값 복원</button></div>
    </div>

    <div class="card"><h2>교육기준 목록</h2>
      <div class="table-wrap"><table><thead><tr><th>교육명</th><th>주기</th><th>구분</th><th>시간/조건</th><th>대상/조건</th><th>관리근거</th><th>사용</th><th>관리</th></tr></thead><tbody>${ruleRows}</tbody></table></div>
    </div>
    <div class="card"><h2>앱 설치 안내</h2><p>휴대폰 Chrome에서 이 페이지 접속 후 <b>⋮ → 홈 화면에 추가</b>를 누르면 앱처럼 사용할 수 있습니다.</p></div>`;
}

async function saveRulesToSettings(rules){
  const res = await db.from("settings").upsert({key:"education_rules", value:JSON.stringify(rules)});
  if(res.error){ toast("교육기준 저장 오류"); return false; }
  state.settings.education_rules = JSON.stringify(rules);
  return true;
}

async function saveRule(){
  const name = val("rule-name");
  const cycle = Number(val("rule-cycle"));
  if(!name) return toast("교육명을 입력하세요.");
  if(Number.isNaN(cycle)) return toast("주기(일)는 숫자로 입력하세요. 반복없음은 0입니다.");
  const idxText = val("rule-index");
  const idx = idxText === "" ? -1 : Number(idxText);
  const rules = educationRules().slice();
  const data = {
    education_name:name,
    category:val("rule-category") || "사용자 지정",
    cycle_days:cycle,
    hours:val("rule-hours"),
    condition:val("rule-condition"),
    basis:val("rule-basis"),
    active:val("rule-active") !== "false"
  };
  const dup = rules.findIndex((r,i)=>i!==idx && r.education_name===name);
  if(dup >= 0) return toast("같은 교육명이 이미 있습니다.");
  if(idx >= 0) rules[idx] = data; else rules.push(data);
  const ok = await saveRulesToSettings(rules);
  if(!ok) return;
  clearRuleForm();
  await loadAll();
  toast("교육기준 저장 완료");
}

function editRule(idx){
  const r = educationRules()[idx];
  if(!r) return;
  setVal("rule-index", idx);
  setVal("rule-name", r.education_name);
  setVal("rule-category", r.category);
  setVal("rule-cycle", r.cycle_days);
  setVal("rule-hours", r.hours);
  setVal("rule-condition", r.condition);
  setVal("rule-basis", r.basis);
  setVal("rule-active", r.active===false?"false":"true");
  scrollTo(0,0);
}
function clearRuleForm(){ ["rule-index","rule-name","rule-category","rule-cycle","rule-hours","rule-condition","rule-basis"].forEach(x=>setVal(x,"")); setVal("rule-active","true"); }
async function deleteRule(idx){
  const rules = educationRules().slice();
  const r = rules[idx];
  if(!r) return;
  if(!confirm(`${r.education_name} 교육기준을 삭제할까요? 기존 교육이력은 삭제되지 않습니다.`)) return;
  rules.splice(idx,1);
  const ok = await saveRulesToSettings(rules);
  if(!ok) return;
  await loadAll();
  toast("교육기준 삭제 완료");
}
async function resetDefaultRules(){
  if(!confirm("교육기준을 기본값으로 복원할까요? 현재 수정한 기준표는 덮어쓰기 됩니다.")) return;
  const ok = await saveRulesToSettings(DEFAULT_EDUCATION_RULES);
  if(!ok) return;
  await loadAll();
  toast("기본 교육기준 복원 완료");
}

async function saveSettings(){ const value=val("sms-template"); const res=await db.from("settings").upsert({key:"sms_template", value}); if(res.error)return toast("저장 오류"); await loadAll(); toast("저장 완료"); }

function val(id){ return document.getElementById(id)?.value?.trim() ?? ""; }
function setVal(id,v){ const el=document.getElementById(id); if(el) el.value=v ?? ""; }

window.addEventListener("load", async () => {
  if (!ready()) return;
  await loadAll();
  showPage("mobile");
});
</script>
</body>
</html>
